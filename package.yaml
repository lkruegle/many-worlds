name:                many-worlds
version:             0.1.0.0
github:              "githubuser/many-worlds"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/many-worlds#readme>

dependencies:
- base >= 4.7 && < 5
- mtl
- containers
- text

default-extensions:
- OverloadedStrings
- LambdaCase

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - ManyWorlds
    - ManyWorlds.WorldBuilder
    - ManyWorlds.WorldRunner
    - ManyWorlds.WorldConfig
    - ManyWorlds.Internal
    - ManyWorlds.InternalTypes

executables:
  many-worlds-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - many-worlds


tests:
  many-worlds-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - many-worlds
    - QuickCheck
